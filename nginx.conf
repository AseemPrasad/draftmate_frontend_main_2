worker_processes auto;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    client_max_body_size 100M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # Shared proxy behaviour for all backend services (which run on
        # 127.0.0.1 inside this container via supervisord).
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Disable buffering so streaming/SSE responses (AI chat, research,
        # workflow) reach the client incrementally.
        proxy_buffering off;

        # ── Backend microservices ──────────────────────────────────────────
        # Each location strips its prefix (trailing slash on proxy_pass) and
        # forwards the remainder to the matching uvicorn service.

        location /converter/   { proxy_pass http://127.0.0.1:8000/; }   # backend/converter
        location /query/       { proxy_pass http://127.0.0.1:8001/; }   # backend/query
        location /enhance/     { proxy_pass http://127.0.0.1:8002/; }   # backend/Enhance_bot
        location /drafter/     { proxy_pass http://127.0.0.1:8003/; }   # backend/Drafter
        location /lexbot/      { proxy_pass http://127.0.0.1:8004/; }   # backend/Deep_research
        location /pdf/         { proxy_pass http://127.0.0.1:8005/; }   # backend/PDF_Editor
        location /case_search/ { proxy_pass http://127.0.0.1:8006/; }   # backend/Case_search
        location /advocate-api/ { proxy_pass http://127.0.0.1:8007/; }  # backend/Advocate_Profile
        location /auth/        { proxy_pass http://127.0.0.1:8009/; }   # backend/login_db
        location /workflow/    { proxy_pass http://127.0.0.1:8010/; }   # backend/legal_workflow
        location /translator/  { proxy_pass http://127.0.0.1:8012/; }   # backend/translator
        location /notification/ { proxy_pass http://127.0.0.1:8015/; }  # backend/Notification
        location /subscriptions/ { proxy_pass http://127.0.0.1:8016/; } # backend/subscriptions

        # ── Frontend (SPA) ────────────────────────────────────────────────
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
