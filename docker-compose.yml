services:

  onlyoffice-server:
    image: onlyoffice/documentserver:latest
    env_file:
      - .env
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - DEV_BYPASS_AUTH=true
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  clamav:
    image: clamav/clamav:latest
    ports:
      - "3310:3310"

  db:
    # Pinned to 15 to match the existing postgres_data volume (initialised by
    # PostgreSQL 15). Postgres refuses to start on a data dir from an older
    # major version, so don't bump this without migrating/recreating the volume.
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-lex_bot_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init SQL runs once on first boot (empty volume)
      - ./docker-initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage


  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_CLIENT_ID=${VITE_CLIENT_ID}
    ports:
      # host:container — nginx inside the image listens on 80 (see nginx.conf),
      # despite the Dockerfile EXPOSE 8080. Map host 80 -> container 80.
      - "80:80"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-lex_bot_db}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-lex_bot_db}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - GOOGLE_SERP_API_KEY=${GOOGLE_SERP_API_KEY}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - FIRECRAWLER_API_KEY=${FIRECRAWLER_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - IKApi=${IKApi}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - PSQL_PASSWD=${PSQL_PASSWD}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LLM_MODE=${LLM_MODE}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - EMBED_MODEL=${EMBED_MODEL}
      - RERANK_MODEL=${RERANK_MODEL}
      - MEM0_ENABLED=${MEM0_ENABLED}
      - SESSION_CACHE_TTL=${SESSION_CACHE_TTL}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      - SCRAPE_DELAY=${SCRAPE_DELAY}
      - MAX_TOKENS_PER_QUERY=${MAX_TOKENS_PER_QUERY}
      - MAX_TOKENS_PER_USER_DAILY=${MAX_TOKENS_PER_USER_DAILY}
      - AGENT_TIMEOUT=${AGENT_TIMEOUT}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT}
      - MAX_QUERY_LENGTH=${MAX_QUERY_LENGTH}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM}
      - CHAT_RETENTION_DAYS=${CHAT_RETENTION_DAYS}
      - MEM0_RETENTION_DAYS=${MEM0_RETENTION_DAYS}
      - TEST_MODE=${TEST_MODE}
      - WEB_SEARCH_MAX_RESULTS=${WEB_SEARCH_MAX_RESULTS}
      - PREFERRED_DOMAINS=${PREFERRED_DOMAINS}
      - UPLOAD_FOLDER=${UPLOAD_FOLDER}
      - INPUT_JSON=${INPUT_JSON}
      - INTERACTIVE=${INTERACTIVE}
      - SSH_KEY_PATH=/app/bastion.key.pem
      - BASTION_IP=${BASTION_IP}
      - SSH_USER=${SSH_USER}
      # Override POSTGRES_DSN so all services use the local db container,
      # not the RDS URL baked into .env.
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-lex_bot_db}
      - AUTH_SERVICE_URL=http://127.0.0.1:8009
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - FRONTEND_URL_DEV=${FRONTEND_URL_DEV}
      - FRONTEND_URL_PROD=${FRONTEND_URL_PROD}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - QDRANT_HOST=qdrant
      - JWT_SECRET=${JWT_SECRET}
      - ADVOCATE_PROFILE_PORT=8007
      - NOTIFICATION_SERVICE_URL=http://127.0.0.1:8015
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app/backend
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend
          ignore:
            - backend/__pycache__/
            - backend/Deep_research/lex_bot/data/
        - action: rebuild
          path: requirements.txt

volumes:
  postgres_data:
  qdrant_data:
  translator_original_data:
  translator_translated_data:
